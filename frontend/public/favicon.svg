<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tv-logo-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818cf8" />
      <stop offset="55%"  stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>
    <filter id="tv-logo-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle so it looks good on any browser tab -->
  <rect width="40" height="40" rx="10" fill="#05050a" />

  <!-- Outer hexagon ring -->
  <path
    d="M20 3 L35 11.5 L35 28.5 L20 37 L5 28.5 L5 11.5 Z"
    stroke="url(#tv-logo-grad)"
    stroke-width="1.5"
    fill="none"
    opacity="0.5"
  />

  <!-- Inner filled hexagon -->
  <path
    d="M20 9 L30 14.5 L30 25.5 L20 31 L10 25.5 L10 14.5 Z"
    fill="url(#tv-logo-grad)"
    opacity="0.15"
  />

  <!-- Circuit node dot at center -->
  <circle cx="20" cy="20" r="4" fill="url(#tv-logo-grad)" filter="url(#tv-logo-glow)" />

  <!-- Circuit trace lines -->
  <line x1="20" y1="16" x2="20" y2="9"    stroke="url(#tv-logo-grad)" stroke-width="1.2" stroke-linecap="round" opacity="0.7" />
  <line x1="23.5" y1="22" x2="30" y2="25.5" stroke="url(#tv-logo-grad)" stroke-width="1.2" stroke-linecap="round" opacity="0.7" />
  <line x1="16.5" y1="22" x2="10" y2="25.5" stroke="url(#tv-logo-grad)" stroke-width="1.2" stroke-linecap="round" opacity="0.7" />

  <!-- Terminal dots on trace ends -->
  <circle cx="20"  cy="9"    r="1.5" fill="url(#tv-logo-grad)" opacity="0.9" />
  <circle cx="30"  cy="25.5" r="1.5" fill="url(#tv-logo-grad)" opacity="0.9" />
  <circle cx="10"  cy="25.5" r="1.5" fill="url(#tv-logo-grad)" opacity="0.9" />
</svg>
